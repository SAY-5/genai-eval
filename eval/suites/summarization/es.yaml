- id: syn-006
  input:
    passage: 'Internet es una red global de redes que intercambian datos usando el conjunto de protocolos TCP/IP, originado en ARPANET a finales de los años sesenta.

      <<ANS=Internet es una red global TCP/IP que surgió de ARPANET a finales de los años sesenta.>>'
  gold:
    summary: Internet es una red global TCP/IP que surgió de ARPANET a finales de los años sesenta.
  metadata:
    topic: internet
    pass: 0
- id: syn-007
  input:
    passage: 'Los motores diésel comprimen aire hasta una temperatura alta para que el combustible inyectado se inflame sin bujía, ofreciendo mayor eficiencia térmica que los motores de gasolina equivalentes.

      <<ANS=Los motores diésel inflaman combustible mediante aire caliente comprimido, con mayor eficiencia que los de gasolina.>>'
  gold:
    summary: Los motores diésel inflaman combustible mediante aire caliente comprimido, con mayor eficiencia que los de gasolina.
  metadata:
    topic: diesel-engine
    pass: 0
- id: syn-008
  input:
    passage: 'La hipótesis principal sobre el origen de la Luna propone que un cuerpo del tamaño de Marte chocó con la Tierra primitiva y los escombros expulsados formaron nuestro satélite.

      <<ANS=La hipótesis principal sostiene que un impactor del tamaño de Marte golpeó la Tierra y formó la Luna con los escombros.>>'
  gold:
    summary: La hipótesis principal sostiene que un impactor del tamaño de Marte golpeó la Tierra y formó la Luna con los escombros.
  metadata:
    topic: moon-formation
    pass: 0
