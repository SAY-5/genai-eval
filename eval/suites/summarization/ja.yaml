examples:
  - id: sum-001
    input:
      passage: |
        太陽光パネルは光起電力セルを用いて太陽光を電気に変換する。光子がシリコン層に
        当たると電子が解放され、直流電流が発生する。その後インバーターによって直流が
        交流に変換され、家庭用機器で使用できる電気となる。最新のパネルは入射光の
        18〜22%を利用可能な電気に変換する。
    gold:
      summary: |
        太陽光パネルは光起電力セルを用いて太陽光を電気に変換し、生じた直流電流を
        インバーターで交流に変えて家庭用に使用できるようにする。
  - id: sum-002
    input:
      passage: |
        ミツバチの個体数はここ二十年で急減している。研究者はこの崩壊の原因として、
        ネオニコチノイド系農薬、ミツバチヘギイタダニ、単一栽培による生息地の喪失、
        商業受粉のための長距離輸送によるストレスなど、複数の要因を挙げている。
    gold:
      summary: |
        ミツバチの個体数は農薬、ダニ、生息地の喪失、商業輸送のストレスなどの複合要因で
        急減している。
  - id: sum-003
    input:
      passage: |
        グーテンベルクの活版印刷機は一四四〇年ごろマインツで導入され、金属の活字と
        油性インクを用いて書籍を大量生産した。五十年のうちに印刷機は欧州二百五十以上の
        都市で稼働し、推定二千万冊が印刷された。書籍の価格は十分の一以下に下がり、
        識字率の向上と新しい思想の伝播を加速した。
    gold:
      summary: |
        グーテンベルクの活版印刷機は一四四〇年頃マインツで導入され、書籍の価格を
        劇的に下げて欧州の識字率向上と思想伝播を加速した。
