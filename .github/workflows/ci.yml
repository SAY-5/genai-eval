name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  POETRY_VIRTUALENVS_CREATE: "true"
  POETRY_VIRTUALENVS_IN_PROJECT: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pipx install poetry==1.8.4
      - run: poetry install --no-interaction
      - run: poetry run ruff check src tests
      - run: poetry run black --check src tests

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pipx install poetry==1.8.4
      - run: poetry install --no-interaction
      - run: poetry run mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pipx install poetry==1.8.4
      - run: poetry install --no-interaction
      - run: poetry run pytest tests/unit -q --cov=src/genai_eval --cov-report=xml
      - name: Upload coverage
        if: matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pipx install poetry==1.8.4
      - run: poetry install --no-interaction
      - name: Run integration tests
        env:
          RUN_INTEGRATION: "1"
        run: poetry run pytest tests/integration -q

  eval-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pipx install poetry==1.8.4
      - run: poetry install --no-interaction
      - name: Run full eval against FakeProvider
        run: |
          poetry run genai-eval run \
            --provider fake --model fake-large \
            --output /tmp/eval-smoke.json
      - name: Compare against committed baseline
        run: |
          poetry run python - <<'PY'
          import json, sys, math
          fresh = json.loads(open("/tmp/eval-smoke.json").read())
          base = json.loads(open("eval/baselines/fake-large.json").read())
          f_rate = fresh["summary"]["overall_pass_rate"]
          b_rate = base["summary"]["overall_pass_rate"]
          print(f"fresh={f_rate:.4f} baseline={b_rate:.4f}")
          assert math.isclose(f_rate, b_rate, abs_tol=1e-6), \
              f"overall pass rate drifted: fresh={f_rate} baseline={b_rate}"
          # cell-level identity
          fc = {(c["task"], c["language"]): c["pass_rate"] for c in fresh["summary"]["cells"]}
          bc = {(c["task"], c["language"]): c["pass_rate"] for c in base["summary"]["cells"]}
          assert set(fc) == set(bc), f"cell set drift: {set(fc) ^ set(bc)}"
          for k in fc:
              assert math.isclose(fc[k], bc[k], abs_tol=1e-6), f"cell drift at {k}: {fc[k]} vs {bc[k]}"
          print("baseline match: OK")
          PY

  bench-regress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pipx install poetry==1.8.4
      - run: poetry install --no-interaction
      - name: Smoke eval
        run: poetry run genai-eval run --provider fake --model fake-large --output /tmp/eval-smoke-cap.json --smoke
      - name: Full eval
        run: poetry run genai-eval run --provider fake --model fake-large --output /tmp/eval-bench.json
      - name: Per-cell drift gate (30%)
        run: poetry run python scripts/bench_regress.py --fresh /tmp/eval-bench.json --baseline eval/baselines/fake-large.json --max-drift 0.30

  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npx next lint
      - run: npx prettier --check .

  typecheck-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npx tsc --noEmit

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npx vitest run

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npx playwright install --with-deps
      - run: npx playwright test

  build:
    runs-on: ubuntu-latest
    needs:
      [
        lint,
        typecheck,
        test,
        eval-smoke,
        bench-regress,
        lint-frontend,
        typecheck-frontend,
        test-frontend,
      ]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: genai-eval-api:ci
      - name: Build dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: false
          tags: genai-eval-dashboard:ci
