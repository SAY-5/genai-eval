services:
  genai-eval-api:
    build: .
    container_name: genai-eval-api
    ports:
      - "8000:8000"
    environment:
      GENAI_EVAL_DATABASE_URL: sqlite+aiosqlite:////data/genai_eval.db
      GENAI_EVAL_DATABASE_URL_SYNC: sqlite:////data/genai_eval.db
    volumes:
      - api-data:/data

  genai-eval-dashboard:
    build:
      context: ./dashboard
    container_name: genai-eval-dashboard
    ports:
      - "3000:3000"
    environment:
      GENAI_EVAL_API_URL: http://genai-eval-api:8000
    depends_on:
      - genai-eval-api

  prometheus:
    image: prom/prometheus:latest
    container_name: genai-eval-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  api-data:
